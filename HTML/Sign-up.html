<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Taskly</title>
       <link rel="stylesheet" href="/css/login.css">

</head>

<body>
    <div class="test">
        <div class="parent-card">

            <div class="logo">
                <img class="img-logo" src="/css/clipboard.png">
                <div class="heading">TASKLY</div>
            </div>

            <div class="login-card-main">
                <div class="inner">

                    <div class="inputs">

                        <div class="fields">
                            <div class="title">Username</div>
                            <input class="username-input" type="text">
                        </div>

                        <div class="fields">
                            <div class="title">Email</div>
                            <input class="email-input" type="text">
                        </div>

                        <div class="fields">
                            <div class="title">Password</div>
                            <input class="pass-input" type="password">
                        </div>

                        <div class="fields">
                            <div class="title">Age</div>
                            <input class="age-input" type="number">
                        </div>

                    </div>

                    <div class="other">
                        <button class="signup-button">Create Account</button>

                        <div>Already have an account?</div>
                        <a href="login.html">Log In</a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="/js/signup.js"></script>
    <script src="/js/config.js"></script>

</body>

</html>
