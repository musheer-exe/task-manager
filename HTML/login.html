<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In-Taskly</title>
    <link rel="stylesheet" href="/css/login.css">
</head>

<body>
    <div class="test">
        <div class="parent-card">


            <div class="logo">
                <div class="lll">
                   <img class="lolo" src="../css/lolo.png" alt="">
</div>
                <div class="heading">TASKLY</div>
               
                
            </div>


            <div class="login-card-main">
                <div class="inner">

                    <div class="inputs">
                        <div class="fields">
                            <div class="title">Email</div>
                            <input class="email-input" type="text">
                        </div>
                        <div class="fields">
                            <div class="title">Password</div>
                            <input class="pass-input" type="text">
                        </div>
                    </div>

                    <div class="other">
                        <a class="forget-password" href="forget-password.html"> Forget password?</a>

                        <button class="Login-button">Log In</button>

                        <div> Don't have an account? </div>
                        <a href="Sign-up.html"> Sign Up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/login.js"></script>

    <script src="/js/config.js"></script>


</body>

</html>
